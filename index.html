<!DOCTYPE html>
<html>
  <head>
    <title>My First App</title>

    <style>
      body {
        font-family: Arial;
        text-align: center;
        margin-top: 100px;
        background-color: green;
        color: black;
      }

      .container {
        background: green;
        padding: 30px;
        border-radius: 10px;
        width: 300px;
        margin: auto;
        box-shadow: 0 0 10px rgba(0,0,0,0.1);
      }

      input {
        padding: 10px;
        width: 90%;
        margin-bottom: 10px;
      }

      button {
        padding: 10px;
        width: 100%;
        background-color: black;
        color: green;
        border: none;
        cursor: pointer;
      }

      button:hover {
        background-color: #333;
      }
    </style>
  </head>

  <body>

    <div class="container">
      <h1 id="title">Sign Up</h1>

      <div id="signupForm">
        <input type="text" id="nameInput" placeholder="Enter your name">

        <input type="email" id="emailInput" placeholder="Enter your email">

        <input type="password" id="passwordInput" placeholder="Enter your password">

        <button onclick="signUp()">Sign Up</button>
      </div>
    </div>

    <script>
      // Check if logged in (using sessionStorage for demo)
      window.onload = function() {
        const loggedInUser = sessionStorage.getItem('user');
        if (loggedInUser) {
          const user = JSON.parse(loggedInUser);
          document.getElementById("title").innerText = `Welcome to the littest illest party ever,
           ${user.name}!`;
          document.getElementById("signupForm").style.display = "none";
        }
      }

      async function signUp() {
        const name = document.getElementById("nameInput").value;
        const email = document.getElementById("emailInput").value;
        const password = document.getElementById("passwordInput").value;

        if (!name || !email || !password) {
          alert("Please fill in all fields.");
          return;
        }

        try {
          const response = await fetch('/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
          });

          const result = await response.json();
          if (response.ok) {
            alert(result.message);
            // Simulate login
            sessionStorage.setItem('user', JSON.stringify({ name, email }));
            document.getElementById("title").innerText = "Welcome " + name + "!";
            document.getElementById("signupForm").style.display = "none";
          } else {
            alert(result.error);
          }
        } catch (error) {
          alert("Error: " + error.message);
        }
      }
    </script>

  </body>
</html>
